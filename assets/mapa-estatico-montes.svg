<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc"><title id="title">Mapa esquemático de los Montes Bocineros de Bizkaia</title><desc id="desc">Esquema territorial orientativo de Gernika-Lumo y los cinco montes tradicionales: Gorbeia, Oiz, Sollube, Kolitza y Ganekogorta.</desc><rect width="1000" height="650" rx="34" fill="#f5eddf"/><path d="M86 514 C214 390 300 427 398 330 C490 240 584 338 706 222 C792 140 890 166 936 98" fill="none" stroke="#c7a86a" stroke-width="12" stroke-linecap="round" opacity=".34"/><path d="M86 564 C232 454 346 510 456 404 C576 288 666 410 890 238" fill="none" stroke="#1f6f61" stroke-width="8" stroke-linecap="round" opacity=".28"/><g stroke="#fff8e8" stroke-width="5"><line x1="610" y1="235" x2="180" y2="500" stroke="#c7a86a" stroke-dasharray="12 12" opacity=".70"/><line x1="610" y1="235" x2="548" y2="296" stroke="#c7a86a" stroke-dasharray="12 12" opacity=".70"/><line x1="610" y1="235" x2="565" y2="130" stroke="#c7a86a" stroke-dasharray="12 12" opacity=".70"/><line x1="610" y1="235" x2="90" y2="320" stroke="#c7a86a" stroke-dasharray="12 12" opacity=".70"/><line x1="610" y1="235" x2="325" y2="410" stroke="#c7a86a" stroke-dasharray="12 12" opacity=".70"/></g><g font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" fill="#0f3d35"><circle cx="610" cy="235" r="13" fill="#c47a2c" stroke="#fff8e8" stroke-width="4"/><text x="630" y="243" font-weight="700">Gernika-Lumo</text><circle cx="180" cy="500" r="13" fill="#0f3d35" stroke="#fff8e8" stroke-width="4"/><text x="202" y="508" font-weight="700">Gorbeia / Gorbea</text><text x="202" y="538" font-size="17" fill="#574d42">1.482 m · sur</text><circle cx="548" cy="296" r="13" fill="#0f3d35" stroke="#fff8e8" stroke-width="4"/><text x="570" y="304" font-weight="700">Oiz</text><text x="570" y="334" font-size="17" fill="#574d42">1.026 m · centro-oriente</text><circle cx="565" cy="130" r="13" fill="#0f3d35" stroke="#fff8e8" stroke-width="4"/><text x="587" y="138" font-weight="700">Sollube</text><text x="587" y="168" font-size="17" fill="#574d42">686 m · costa</text><circle cx="90" cy="320" r="13" fill="#0f3d35" stroke="#fff8e8" stroke-width="4"/><text x="112" y="328" font-weight="700">Kolitza / Colisa</text><text x="112" y="358" font-size="17" fill="#574d42">897 m · Encartaciones</text><circle cx="325" cy="410" r="13" fill="#0f3d35" stroke="#fff8e8" stroke-width="4"/><text x="347" y="418" font-weight="700">Ganekogorta</text><text x="347" y="448" font-size="17" fill="#574d42">998–999 m · Bilbao</text></g><text x="52" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#0f3d35">Mapa territorial orientativo</text><text x="52" y="108" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="19" fill="#574d42">Esquema divulgativo: ayuda a entender el territorio, no prueba una lista medieval cerrada.</text></svg>