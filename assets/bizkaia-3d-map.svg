<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
<title id="title">Mapa 3D aproximado de Bizkaia y los Montes Bocineros</title>
<desc id="desc">Representación visual con relieve 3D aproximado de Bizkaia, Gernika y los cinco montes bocineros tradicionales.</desc>
<defs>
  <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b7d5dc"/><stop offset="1" stop-color="#e7f0ea"/></linearGradient>
  <linearGradient id="land" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e8ddbd"/><stop offset=".45" stop-color="#cbb37e"/><stop offset="1" stop-color="#947044"/></linearGradient>
  <linearGradient id="ridge" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#edf2d2"/><stop offset=".5" stop-color="#7ea16a"/><stop offset="1" stop-color="#285647"/></linearGradient>
  <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#173d34" stop-opacity=".55"/><stop offset="1" stop-color="#173d34" stop-opacity="0"/></linearGradient>
  <radialGradient id="glow" cx="50%" cy="45%" r="60%"><stop offset="0" stop-color="#fff8df" stop-opacity=".95"/><stop offset="1" stop-color="#fff8df" stop-opacity="0"/></radialGradient>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#13231d" flood-opacity=".32"/></filter>
  <filter id="pinShadow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="10" stdDeviation="5" flood-color="#11261f" flood-opacity=".35"/></filter>
  <style>
    .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;font-size:28px;fill:#123f35;paint-order:stroke;stroke:#fff8ee;stroke-width:7px;stroke-linejoin:round}
    .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;font-size:21px;fill:#315049;paint-order:stroke;stroke:#fff8ee;stroke-width:5px;stroke-linejoin:round}
    .note{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;fill:#5d675f}
    .pin{filter:url(#pinShadow)}
    .signal{fill:none;stroke:#c58b42;stroke-width:5;stroke-dasharray:12 13;stroke-linecap:round;opacity:.75}
  </style>
</defs>
